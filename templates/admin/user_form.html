{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-semibold py-2">
                {% if edit_user %}编辑用户{% else %}新建用户{% endif %}
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger py-2 small">{{ error }}</div>
                {% endif %}

                <form method="post"
                      action="{% if edit_user %}/admin/users/{{ edit_user.id }}/edit{% else %}/admin/users/new{% endif %}">

                    <div class="mb-3">
                        <label class="form-label fw-medium">用户名 <span class="text-danger">*</span></label>
                        <input type="text" name="username" class="form-control" required maxlength="50"
                               value="{% if edit_user %}{{ edit_user.username }}{% endif %}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium">
                            密码
                            {% if not edit_user %}<span class="text-danger"> *</span>
                            {% else %}<span class="text-muted small">（留空则不修改）</span>{% endif %}
                        </label>
                        <input type="password" name="password" class="form-control"
                               {% if not edit_user %}required{% endif %}>
                    </div>

                    <div class="mb-4">
                        {% if edit_user and edit_user.id == user.id %}
                        <input type="hidden" name="is_admin" value="1">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" checked disabled>
                            <label class="form-check-label text-muted">管理员权限（不能修改自己）</label>
                        </div>
                        {% else %}
                        <div class="form-check">
                            <input type="checkbox" name="is_admin" value="1" class="form-check-input" id="is_admin"
                                   {% if edit_user and edit_user.is_admin %}checked{% endif %}>
                            <label class="form-check-label" for="is_admin">管理员权限</label>
                        </div>
                        {% endif %}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="/admin/users" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
